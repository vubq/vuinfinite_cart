spring:
  application:
    name: vuinfinite-cart

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_vuinfinite_cart}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/auth/customer/oauth2/callback/{registrationId}"
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
            scope: email,public_profile
            redirect-uri: "{baseUrl}/api/auth/customer/oauth2/callback/{registrationId}"
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v18.0/me?fields=id,name,email,picture

app:
  jwt:
    # Customer tokens
    customer-secret: ${JWT_CUSTOMER_SECRET:change-this-customer-secret-key-min-256-bits}
    customer-access-token-expiry-ms: 900000        # 15 minutes
    customer-refresh-token-expiry-ms: 604800000    # 7 days
    # Admin tokens
    admin-secret: ${JWT_ADMIN_SECRET:change-this-admin-secret-key-min-256-bits}
    admin-access-token-expiry-ms: 900000           # 15 minutes
    admin-refresh-token-expiry-ms: 86400000        # 1 day

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    vuinfinitecart: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
